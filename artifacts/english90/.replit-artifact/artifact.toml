kind = "web"
previewPath = "/"
title = "90-Day English Learning"
version = "1.0.0"
id = "artifacts/english90"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20354

[services.development]
run = "pnpm --filter @workspace/english90 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/english90", "run", "build" ]
publicDir = "artifacts/english90/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20354"
BASE_PATH = "/"
